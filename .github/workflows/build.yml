name: build

on:
  pull_request:
    branches: [main, master, alpha, beta]
  push:
    branches-ignore: [main, master, alpha, beta]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout

jobs:
  linux_nix:
    # Skip when dispatched from release.yml's publish phase: the smoke
    # `build` job already validated nix against this commit minutes earlier,
    # and the nix output isn't attached to the GitHub release.
    if: ${{ github.event_name != 'workflow_dispatch' }}
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@80850f1ad3fbf37fcd677a6d49ed80169d57ea3e # main

  package:
    name: Package VSIX
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - run: npm install

      - run: npm test

      - run: npm run package

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error
